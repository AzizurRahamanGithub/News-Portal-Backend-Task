

services:
  db:
    image: postgres:15-alpine
    container_name: news_db_mashk
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - django_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: news_redis_mashk
    networks:
      - django_net
    restart: unless-stopped  

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_web_mashk
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 180"
    volumes:
      - .:/app
      - static_volume:/app/config/staticfiles
    ports:
      - "7001:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - django_net
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:

networks:
  django_net:
    driver: bridge


