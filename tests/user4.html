<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Django Realtime Chat</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
    #chat-container { height: 80vh; overflow-y: auto; padding: 15px; }
    .message { display: flex; align-items: flex-end; margin-bottom: 12px; max-width: 70%; }
    .sent { margin-left: auto; flex-direction: row-reverse; text-align: right; }
    .received { margin-right: auto; }
    .message img { width: 40px; height: 40px; border-radius: 50%; margin: 0 8px; }
    .message-content { background: #e1f0ff; padding: 10px 15px; border-radius: 15px; }
    .sent .message-content { background: #d1ffd6; }
    .username { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
    .timestamp { font-size: 10px; color: gray; margin-top: 4px; display: block; }
    #input-area { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ddd; }
    #messageInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
    #sendBtn { margin-left: 10px; padding: 10px 20px; border: none; background: #007bff; color: #fff; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat-container"></div>

  <div id="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    // 👇 Change these IDs according to the logged-in and chatting user
    const currentUserId = 4;  // Logged-in user
    const otherUserId = 1;    // Chat partner
    const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzU2NjE0NzE3LCJpYXQiOjE3NTYxODI3MTcsImp0aSI6Ijk4ZjgyOTBjOThjMDQ2OTNhM2VkNWZhMGM0NDU2YmZkIiwidXNlcl9pZCI6IjQiLCJ1c2VybmFtZSI6IndvcXlwaSIsImVtYWlsIjoiZGFsYXphdm9AbWFpbGluYXRvci5jb20iLCJyb2xlIjoidXNlciJ9.qXERtlPESSovgLyBdxb8QJMlNqlZ6zksFJfyM-Nc7ok"; // <-- Put JWT here
  //  'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzU2MjkxOTcyLCJpYXQiOjE3NTU4NTk5NzIsImp0aSI6ImE2NWJlMDBkNmRhMDQxNjliYTNhN2Q3OTkwNDE0YmQ5IiwidXNlcl9pZCI6IjEiLCJ1c2VybmFtZSI6ImFkbWluIiwiZW1haWwiOiJhZG1pbkBnbWFpbC5jb20iLCJyb2xlIjoidXNlciJ9.vlPQVl_ewY9IHMm6aMHiVswhLUWi-JZ4eyVYeJN4MPk' // replace with your token
    const messagesContainer = document.getElementById("chat-container");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    // 1️⃣ Load saved messages (chat history)
    fetch(`http://127.0.0.1:8000/api/v1/chat/history/${otherUserId}/`, {
      headers: { "Authorization": `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
      data.forEach(msg => addMessage(msg));  // your API gives array
      scrollToBottom();
    });

    // 2️⃣ Setup WebSocket for realtime messages
    const ws = new WebSocket(`ws://127.0.0.1:8001/ws/chat/${currentUserId}/${otherUserId}/`);

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      addMessage(msg);
      scrollToBottom();
    };

    // 3️⃣ Render message in chat box
    function addMessage(msg) {
      const div = document.createElement("div");
      div.classList.add("message", msg.sender === currentUserId ? "sent" : "received");

      const img = document.createElement("img");
      img.src = msg.sender === currentUserId ? msg.sender_photo : msg.sender_photo;

      const content = document.createElement("div");
      content.classList.add("message-content");

      const username = document.createElement("div");
      username.classList.add("username");
      username.textContent = msg.sender_username;

      const text = document.createElement("div");
      text.textContent = msg.message;

      const timestamp = document.createElement("span");
      timestamp.classList.add("timestamp");
      timestamp.textContent = new Date(msg.timestamp).toLocaleTimeString();

      content.appendChild(username);
      content.appendChild(text);
      content.appendChild(timestamp);

      div.appendChild(img);
      div.appendChild(content);

      messagesContainer.appendChild(div);
    }

    // 4️⃣ Send message via WebSocket
    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      const msgData = {
        sender: currentUserId,
        receiver: otherUserId,
        message: message
      };

      ws.send(JSON.stringify(msgData));
      messageInput.value = "";
    }

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
  </script>
</body>
</html>
