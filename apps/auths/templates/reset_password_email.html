<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Management</title>
    <style>
      body,
      table,
      td,
      div,
      p {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        line-height: 1.6;
      }
      img {
        border: 0;
        display: block;
      }
      .flex-center {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .verification-box {
        background-color: #fbf5e0;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px 40px;
        font-size: 24px;
        font-weight: bold;
        color: #084c61;
        text-align: center;
        letter-spacing: 4px;
        font-family: 'Courier New', monospace;
      }
    </style>
  </head>
  <body style="
      margin: 0;
      padding: 0;
      background: rgb(239, 253, 253);
      background-size: cover;
      background-position: center;
    ">
    <div style="width: 100%; padding: 40px 20px">
      <div style="
          max-width: 600px;
          width: 100%;
          margin: 0 auto;
          background-color: #ffffff;
          border-radius: 12px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
          overflow: hidden;
        ">
        <!-- Logo -->
        <div class="flex-center" style="padding: 40px 40px 20px">
          <!--  <img
            src="https://res.cloudinary.com/dnsorselg/image/upload/v1740109783/uploads/uesajhwkt6lrxro7ezps.png"
            alt="Company Logo"
            style="height: 80px"
          />  -->
        </div>
        <!-- Dynamic OTP Email Template -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #effdfd; padding: 40px 0;">
          <tr>
            <td align="center">
              <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 12px; padding: 40px;">
                <!-- Heading -->
                <tr>
                  <td align="center" style="padding-bottom: 30px;">
                    <h1 style="color: #084c61; font-size: 28px; font-weight: 700; margin: 0;">{{ subject }}</h1>
                  </td>
                </tr>

                <!-- Message -->
                <tr>
                  <td align="center" style="padding-bottom: 30px; color: #4b5563; font-size: 16px;">{{ message }}</td>
                </tr>

                <!-- OTP -->
                <tr>
                  <td align="center" style="padding-bottom: 30px;">
                    <div style="background-color: #fbf5e0; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px 40px; font-size: 24px; font-weight: bold; color: #084c61; font-family: 'Courier New', monospace; letter-spacing: 4px;">{{ reset_url }}</div>
                  </td>
                </tr>

                <!-- Instructions -->
                <tr>
                  <td align="center" style="color: #6b7280; font-size: 14px; padding-bottom: 20px;">
                    This OTP will expire in 10 minutes. Please enter it on the reset page.<br />
                    If you didn’t request this, please ignore this email.
                  </td>
                </tr>

                <!-- Footer -->
                <tr>
                  <td align="center" style="color: #9ca3af; font-size: 12px; border-top: 1px solid #e5e7eb; padding-top: 30px;">
                    This is an automated message, please do not reply.<br />
                    &copy; All rights reserved.
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
