<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification Successful</title>
    <style>
      body,
      div,
      p {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Arial, sans-serif;
        line-height: 1.6;
      }
      img {
        border: 0;
        display: block;
      }
      .flex-center {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cta-button {
        display: inline-block;
        background-color: #084c61;
        color: #ffffff;
        padding: 16px 32px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        text-align: center;
        transition: background-color 0.2s ease;
      }
      .cta-button:hover {
        background-color: #063b4b;
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: rgb(239, 253, 253);
      background-size: cover;
      background-position: center;
    "
  >
    <div style="width: 100%; padding: 40px 20px">
      <div
        style="
          max-width: 600px;
          width: 100%;
          margin: 0 auto;
          background-color: #ffffff;
          border-radius: 12px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
          overflow: hidden;
        "
      >
        <!-- Logo -->
        <div class="flex-center" style="padding: 40px 40px 20px">
          <!-- <img
            src="https://res.cloudinary.com/dnsorselg/image/upload/v1740109783/uploads/uesajhwkt6lrxro7ezps.png"
            alt="Company Logo"
            style="height: 80px"
          /> -->
        </div>

        <!-- Success Message -->
        <div class="flex-center" style="padding: 0 40px 20px">
          <h1
            style="
              color: #084c61;
              font-size: 28px;
              font-weight: 700;
              margin: 0;
              text-align: center;
            "
          >
            ✅ Email Verified Successfully!
          </h1>
        </div>

        <!-- Message Content -->
        <div style="padding: 0 40px 30px">
          <p
            style="
              color: #4b5563;
              margin-bottom: 20px;
              text-align: center;
              font-size: 16px;
            "
          >
            Thank you for verifying your email address. Your account is now
            fully activated and you can start using our services.
          </p>
        </div>

        <!-- CTA Button -->
        <div class="flex-center" style="padding: 0 40px 30px">
          <a href="http://localhost:3000/login" class="cta-button"
            >Go to Dashboard</a
          >
        </div>

        <!-- Footer -->
        <div
          style="
            padding: 30px 40px;
            border-top: 1px solid #e5e7eb;
            background-color: #f9fafb;
          "
        >
          <p
            style="
              color: #6b7280;
              font-size: 12px;
              text-align: center;
              margin-bottom: 10px;
            "
          >
            If you didn't request this verification, please ignore this email or
            contact our support team.
          </p>
          <p style="color: #9ca3af; font-size: 12px; text-align: center">
            &copy; All rights reserved.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
